name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy using deploy.sh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 130.49.141.252
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/site
            echo "🚀 Starting deploy via deploy.sh..."
            ./deploy.sh