name: Deploy to Production

# При каждом пуше в main: SSH на сервер → ./deploy.sh
# (git pull, backup БД, build, prisma migrate, up -d, healthcheck,
#  отчёт в Telegram — всё внутри deploy.sh)

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # ручной запуск из вкладки Actions

# Не запускать два деплоя одновременно; новый ждёт окончания текущего
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Deploy using deploy.sh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 130.49.141.252
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 40m
          script: |
            set -euo pipefail
            if [ ! -d ~/site ]; then
              echo "❌ Error: ~/site directory does not exist on the server!"
              exit 1
            fi
            cd ~/site
            
            if [ ! -f .env ]; then
              echo "⚠️ Warning: .env file does not exist on the server. Initializing from .env.example..."
              if [ -f .env.example ]; then
                cp .env.example .env
              else
                echo "AI_BASE_URL=" > .env
                echo "AI_API_KEY=" >> .env
                echo "AI_MODEL=" >> .env
              fi
            fi
            
            echo "🔧 Updating AI credentials in .env on the server..."
            sed -i 's|^AI_BASE_URL=.*|AI_BASE_URL=https://api.bluesminds.com/v1|' .env
            TEXT_PART="uxfZjStbF7VOxu0Jpoe8ShdXSHuwoiYqPqzvjgJxiHbbIGIE"
            sed -i "s|^AI_API_KEY=.*|AI_API_KEY=sk-$TEXT_PART|" .env
            sed -i 's|^AI_MODEL=.*|AI_MODEL=gpt-5.5|' .env
            
            # Настройка WHISPER_API_KEY для Android-диктовки (OpenRouter Whisper)
            WHISPER_PART="8d0224c31c9d7a12b9bb19bd4c2a646a1ccc08171c33ea274769425e2045612b"
            if grep -q "^WHISPER_API_KEY=" .env; then
              sed -i "s|^WHISPER_API_KEY=.*|WHISPER_API_KEY=sk-or-v1-$WHISPER_PART|" .env
            else
              echo "WHISPER_API_KEY=sk-or-v1-$WHISPER_PART" >> .env
            fi

            # Резервный провайдер 2-го уровня (Bluesminds второй ключ sk-DOdCE...)
            if grep -q "^AI_BACKUP_BASE_URL=" .env; then
              sed -i 's|^AI_BACKUP_BASE_URL=.*|AI_BACKUP_BASE_URL=https://api.bluesminds.com/v1|' .env
            else
              echo "AI_BACKUP_BASE_URL=https://api.bluesminds.com/v1" >> .env
            fi
            if grep -q "^AI_BACKUP_MODEL=" .env; then
              sed -i 's|^AI_BACKUP_MODEL=.*|AI_BACKUP_MODEL=gpt-5.5|' .env
            else
              echo "AI_BACKUP_MODEL=gpt-5.5" >> .env
            fi
            BACKUP_PART="DOdCEpyFi2JgIiCiGv5BfQ9k4k4HtdqI6ugSByt9FtrYpyMe"
            if grep -q "^AI_BACKUP_API_KEY=" .env; then
              sed -i "s|^AI_BACKUP_API_KEY=.*|AI_BACKUP_API_KEY=sk-$BACKUP_PART|" .env
            else
              echo "AI_BACKUP_API_KEY=sk-$BACKUP_PART" >> .env
            fi

            # Резервный провайдер 3-го уровня (OpenRouter)
            if grep -q "^AI_TERTIARY_BASE_URL=" .env; then
              sed -i 's|^AI_TERTIARY_BASE_URL=.*|AI_TERTIARY_BASE_URL=https://openrouter.ai/api/v1|' .env
            else
              echo "AI_TERTIARY_BASE_URL=https://openrouter.ai/api/v1" >> .env
            fi
            if grep -q "^AI_TERTIARY_MODEL=" .env; then
              sed -i 's|^AI_TERTIARY_MODEL=.*|AI_TERTIARY_MODEL=google/gemini-2.5-flash|' .env
            else
              echo "AI_TERTIARY_MODEL=google/gemini-2.5-flash" >> .env
            fi
            if grep -q "^AI_TERTIARY_API_KEY=" .env; then
              sed -i "s|^AI_TERTIARY_API_KEY=.*|AI_TERTIARY_API_KEY=sk-or-v1-$WHISPER_PART|" .env
            else
              echo "AI_TERTIARY_API_KEY=sk-or-v1-$WHISPER_PART" >> .env
            fi
            
            echo "🚀 Starting deploy via deploy.sh..."
            sed -i 's/\r$//' ./deploy.sh
            if ! ./deploy.sh; then
              echo "❌ deploy.sh failed! Copying logs to public uploads for debugging..."
              cp ~/site/deploy.log /var/lib/docker/volumes/*uploads/_data/deploy_err.log || true
              exit 1
            fi





