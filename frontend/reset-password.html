<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Сброс пароля — Память</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body { background: #0a0a0d; min-height: 100vh; margin: 0; font-family: sans-serif; }
  .reset-card { max-width: 420px; margin: 80px auto; padding: 32px; background: #1a1a1f; border: 1px solid #333; border-radius: 12px; color: #eee; }
  .reset-card h1 { font-size: 22px; margin: 0 0 16px; color: #d4a655; }
  .reset-card input { width: 100%; padding: 12px; background: #0f0f12; border: 1px solid #444; color: #eee; border-radius: 6px; margin: 6px 0; box-sizing: border-box; font-size: 15px; }
  .reset-card button { width: 100%; padding: 12px; background: #d4a655; color: #1a1a1f; border: 0; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 12px; font-size: 15px; }
  .reset-card button:disabled { opacity: .5; cursor: not-allowed; }
  .reset-card .msg { margin-top: 12px; padding: 10px; border-radius: 6px; font-size: 14px; }
  .reset-card .msg.ok { background: #1f3a1f; color: #9be09b; }
  .reset-card .msg.err { background: #3a1f1f; color: #e09b9b; }
  .reset-card a { color: #d4a655; }
</style>
</head>
<body>
<div class="reset-card">
  <h1>Сброс пароля</h1>
  <p>Введите новый пароль для вашей учётной записи.</p>
  <form id="form">
    <input type="password" id="pw1" placeholder="Новый пароль (мин. 8 символов)" minlength="8" required>
    <input type="password" id="pw2" placeholder="Повторите пароль" minlength="8" required>
    <button type="submit" id="submit">Сменить пароль</button>
  </form>
  <div id="msg"></div>
</div>
<script>
(function () {
  const params = new URLSearchParams(location.search);
  const token = params.get("token");
  const form = document.getElementById("form");
  const msg = document.getElementById("msg");
  const btn = document.getElementById("submit");
  if (!token) {
    form.style.display = "none";
    msg.className = "msg err";
    msg.textContent = "Ссылка некорректна — отсутствует токен.";
    return;
  }
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const pw1 = document.getElementById("pw1").value;
    const pw2 = document.getElementById("pw2").value;
    msg.className = ""; msg.textContent = "";
    if (pw1 !== pw2) { msg.className = "msg err"; msg.textContent = "Пароли не совпадают."; return; }
    if (pw1.length < 8) { msg.className = "msg err"; msg.textContent = "Пароль минимум 8 символов."; return; }
    btn.disabled = true; btn.textContent = "Сохраняем…";
    try {
      const r = await fetch("/api/auth/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token: token, newPassword: pw1 }),
      });
      const j = await r.json();
      if (j.ok) {
        form.style.display = "none";
        msg.className = "msg ok";
        msg.innerHTML = "Пароль изменён. <a href='/'>Войти</a>";
      } else {
        msg.className = "msg err"; msg.textContent = j.error || "Ошибка";
        btn.disabled = false; btn.textContent = "Сменить пароль";
      }
    } catch (err) {
      msg.className = "msg err"; msg.textContent = "Сеть недоступна.";
      btn.disabled = false; btn.textContent = "Сменить пароль";
    }
  });
})();
</script>
</body>
</html>
