<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Сброс пароля — Память</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  body {
    background: #0c0a06;
    color: #f0e9d6;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image: radial-gradient(circle at 50% 50%, rgba(200, 168, 75, 0.03) 0%, transparent 80%);
    box-sizing: border-box;
  }
  .reset-card {
    max-width: 420px;
    width: 100%;
    background: rgba(12, 10, 6, 0.98);
    border: 1px solid rgba(200, 168, 75, 0.22);
    border-radius: 14px;
    padding: 40px 32px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(200, 168, 75, 0.03);
    position: relative;
    box-sizing: border-box;
  }
  .reset-card::before {
    content: '';
    position: absolute;
    top: 0; left: 20%; right: 20%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #c8a84b, transparent);
    border-radius: 0 0 2px 2px;
  }
  .reset-card h1 {
    margin: 0 0 10px;
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 400;
    color: #f0e9d6;
    text-align: center;
    letter-spacing: -0.01em;
  }
  .reset-card p {
    color: rgba(240, 233, 214, 0.6);
    font-size: 14px;
    margin: 0 0 24px;
    line-height: 1.6;
    text-align: center;
    font-weight: 300;
  }
  .reset-card input {
    width: 100%;
    box-sizing: border-box;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(200, 168, 75, 0.22);
    color: #f0e9d6;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 15px;
    margin: 8px 0;
    transition: all 0.3s ease;
    outline: none;
  }
  .reset-card input:focus {
    border-color: #c8a84b;
    background: rgba(0, 0, 0, 0.55);
    box-shadow: 0 0 0 3px rgba(200, 168, 75, 0.1);
  }
  .reset-card button {
    width: 100%;
    margin-top: 20px;
    background: linear-gradient(135deg, #b3923b, #e5c060);
    border: 0;
    color: #000;
    padding: 13px;
    font-size: 15px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(200, 168, 75, 0.2);
  }
  .reset-card button:hover:not(:disabled) {
    background: linear-gradient(135deg, #c8a84b, #f0d580);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(200, 168, 75, 0.35);
  }
  .reset-card button:active:not(:disabled) {
    transform: translateY(0);
  }
  .reset-card button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .reset-card .msg {
    margin-top: 18px;
    padding: 12px;
    border-radius: 6px;
    font-size: 14px;
    text-align: center;
    line-height: 1.5;
  }
  .reset-card .msg.ok {
    background: rgba(31, 58, 31, 0.4);
    border: 1px solid rgba(123, 216, 143, 0.25);
    color: #7bd88f;
  }
  .reset-card .msg.err {
    background: rgba(58, 31, 31, 0.4);
    border: 1px solid rgba(255, 122, 122, 0.25);
    color: #ff7a7a;
  }
  .reset-card a {
    color: #c8a84b;
    text-decoration: none;
    border-bottom: 1px dashed rgba(200, 168, 75, 0.4);
    transition: all 0.2s ease;
  }
  .reset-card a:hover {
    color: #e5c060;
    border-bottom-color: #e5c060;
  }
</style>
</head>
<body>
<div class="reset-card">
  <h1>Сброс пароля</h1>
  <p>Введите новый пароль для вашей учётной записи.</p>
  <form id="form">
    <input type="password" id="pw1" placeholder="Новый пароль (мин. 8 символов)" minlength="8" required>
    <input type="password" id="pw2" placeholder="Повторите пароль" minlength="8" required>
    <button type="submit" id="submit">Сменить пароль</button>
  </form>
  <div id="msg"></div>
</div>
<script>
(function () {
  const params = new URLSearchParams(location.search);
  const token = params.get("token");
  const form = document.getElementById("form");
  const msg = document.getElementById("msg");
  const btn = document.getElementById("submit");
  if (!token) {
    form.style.display = "none";
    msg.className = "msg err";
    msg.textContent = "Ссылка некорректна — отсутствует токен.";
    return;
  }
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const pw1 = document.getElementById("pw1").value;
    const pw2 = document.getElementById("pw2").value;
    msg.className = ""; msg.textContent = "";
    if (pw1 !== pw2) { msg.className = "msg err"; msg.textContent = "Пароли не совпадают."; return; }
    if (pw1.length < 8) { msg.className = "msg err"; msg.textContent = "Пароль минимум 8 символов."; return; }
    btn.disabled = true; btn.textContent = "Сохраняем…";
    try {
      const r = await fetch("/api/auth/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token: token, newPassword: pw1 }),
      });
      const j = await r.json();
      if (j.ok) {
        form.style.display = "none";
        msg.className = "msg ok";
        msg.innerHTML = "Пароль изменён. <a href='/'>Войти</a>";
      } else {
        msg.className = "msg err"; msg.textContent = j.error || "Ошибка";
        btn.disabled = false; btn.textContent = "Сменить пароль";
      }
    } catch (err) {
      msg.className = "msg err"; msg.textContent = "Сеть недоступна.";
      btn.disabled = false; btn.textContent = "Сменить пароль";
    }
  });
})();
</script>
</body>
</html>
