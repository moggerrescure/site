<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Восстановление пароля — Память</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/styles/base.css" />
<style>
  body {
    background: #0c0a06;
    color: #f0e9d6;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image: radial-gradient(circle at 50% 50%, rgba(200, 168, 75, 0.03) 0%, transparent 80%);
  }
  .card {
    background: rgba(12, 10, 6, 0.98);
    border: 1px solid rgba(200, 168, 75, 0.22);
    border-radius: 14px;
    padding: 40px 32px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(200, 168, 75, 0.03);
    position: relative;
    box-sizing: border-box;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 20%; right: 20%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #c8a84b, transparent);
    border-radius: 0 0 2px 2px;
  }
  h1 {
    margin: 0 0 10px;
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 400;
    color: #f0e9d6;
    text-align: center;
    letter-spacing: -0.01em;
  }
  .sub {
    color: rgba(240, 233, 214, 0.6);
    font-size: 14px;
    margin: 0 0 24px;
    line-height: 1.6;
    text-align: center;
    font-weight: 300;
  }
  label {
    display: block;
    font-size: 12px;
    color: #c8a84b;
    margin: 14px 0 6px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  input {
    width: 100%;
    box-sizing: border-box;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(200, 168, 75, 0.22);
    color: #f0e9d6;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 15px;
    transition: all 0.3s ease;
    outline: none;
  }
  input:focus {
    border-color: #c8a84b;
    background: rgba(0, 0, 0, 0.55);
    box-shadow: 0 0 0 3px rgba(200, 168, 75, 0.1);
  }
  button {
    width: 100%;
    margin-top: 24px;
    background: linear-gradient(135deg, #b3923b, #e5c060);
    border: 0;
    color: #000;
    padding: 13px;
    font-size: 15px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(200, 168, 75, 0.2);
  }
  button:hover:not(:disabled) {
    background: linear-gradient(135deg, #c8a84b, #f0d580);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(200, 168, 75, 0.35);
  }
  button:active:not(:disabled) {
    transform: translateY(0);
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .msg {
    margin-top: 18px;
    font-size: 14px;
    min-height: 20px;
    line-height: 1.5;
    text-align: center;
  }
  .msg.ok  { color: #7bd88f; font-style: italic; }
  .msg.err { color: #ff7a7a; font-style: italic; }
  .links {
    margin-top: 24px;
    text-align: center;
    font-size: 13px;
  }
  .links a {
    color: rgba(240, 233, 214, 0.5);
    text-decoration: none;
    border-bottom: 1px dashed rgba(200, 168, 75, 0.2);
    transition: all 0.2s ease;
  }
  .links a:hover {
    color: #c8a84b;
    border-bottom-color: #c8a84b;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Восстановление пароля</h1>
    <p class="sub">Введите email, на который вы регистрировались. Если такой аккаунт существует, мы пришлём ссылку для сброса пароля (действует 1 час).</p>
    <form id="forgotForm" autocomplete="off">
      <label for="email">Email</label>
      <input id="email" type="email" name="email" required autocomplete="email" placeholder="you@example.com" />
      <button id="btn" type="submit">Отправить ссылку</button>
      <div id="msg" class="msg"></div>
    </form>
    <div class="links">
      <a href="/index.html">← На главную</a>
    </div>
  </div>
<script>
(() => {
  const form = document.getElementById("forgotForm");
  const btn  = document.getElementById("btn");
  const msg  = document.getElementById("msg");
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    if (!email) return;
    btn.disabled = true; btn.textContent = "Отправка...";
    msg.className = "msg"; msg.textContent = "";
    try {
      const r = await fetch("/api/auth/forgot-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });
      if (r.ok) {
        msg.className = "msg ok";
        msg.textContent = "Если такой email зарегистрирован — мы отправили ссылку. Проверьте почту (включая «Спам»).";
        form.reset();
      } else if (r.status === 429) {
        msg.className = "msg err";
        msg.textContent = "Слишком много запросов. Попробуйте через несколько минут.";
      } else {
        msg.className = "msg err";
        msg.textContent = "Не удалось отправить запрос. Попробуйте позже.";
      }
    } catch (err) {
      msg.className = "msg err";
      msg.textContent = "Сеть недоступна.";
    } finally {
      btn.disabled = false; btn.textContent = "Отправить ссылку";
    }
  });
})();
</script>
</body>
</html>
