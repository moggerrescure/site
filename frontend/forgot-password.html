<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Восстановление пароля — Память</title>
<link rel="stylesheet" href="/styles/base.css" />
<style>
  body { background:#0f1115; color:#e8eaed; font-family:-apple-system,Segoe UI,Roboto,sans-serif; margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { background:#1a1d24; border:1px solid #2a2f3a; border-radius:14px; padding:32px; max-width:420px; width:100%; box-shadow:0 8px 32px rgba(0,0,0,0.4); }
  h1 { margin:0 0 8px; font-size:22px; }
  .sub { color:#9aa0a6; font-size:14px; margin:0 0 24px; line-height:1.5; }
  label { display:block; font-size:13px; color:#c4c7cc; margin:14px 0 6px; }
  input { width:100%; box-sizing:border-box; background:#0f1115; border:1px solid #2a2f3a; color:#e8eaed; padding:11px 14px; border-radius:8px; font-size:15px; }
  input:focus { outline:none; border-color:#4a90e2; }
  button { width:100%; margin-top:20px; background:#4a90e2; border:0; color:#fff; padding:12px; font-size:15px; font-weight:500; border-radius:8px; cursor:pointer; transition:background .15s; }
  button:hover:not(:disabled) { background:#5aa0f2; }
  button:disabled { opacity:.55; cursor:not-allowed; }
  .msg { margin-top:14px; font-size:14px; min-height:20px; line-height:1.4; }
  .msg.ok  { color:#7bd88f; }
  .msg.err { color:#ff7a7a; }
  .links { margin-top:18px; text-align:center; font-size:13px; }
  .links a { color:#9aa0a6; text-decoration:none; }
  .links a:hover { color:#e8eaed; text-decoration:underline; }
</style>
</head>
<body>
  <div class="card">
    <h1>Восстановление пароля</h1>
    <p class="sub">Введите email, на который вы регистрировались. Если такой аккаунт существует, мы пришлём ссылку для сброса пароля (действует 1 час).</p>
    <form id="forgotForm" autocomplete="off">
      <label for="email">Email</label>
      <input id="email" type="email" name="email" required autocomplete="email" placeholder="you@example.com" />
      <button id="btn" type="submit">Отправить ссылку</button>
      <div id="msg" class="msg"></div>
    </form>
    <div class="links">
      <a href="/index.html">← На главную</a>
    </div>
  </div>
<script>
(() => {
  const form = document.getElementById("forgotForm");
  const btn  = document.getElementById("btn");
  const msg  = document.getElementById("msg");
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    if (!email) return;
    btn.disabled = true; btn.textContent = "Отправка...";
    msg.className = "msg"; msg.textContent = "";
    try {
      const r = await fetch("/api/auth/forgot-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });
      if (r.ok) {
        msg.className = "msg ok";
        msg.textContent = "Если такой email зарегистрирован — мы отправили ссылку. Проверьте почту (включая «Спам»).";
        form.reset();
      } else if (r.status === 429) {
        msg.className = "msg err";
        msg.textContent = "Слишком много запросов. Попробуйте через несколько минут.";
      } else {
        msg.className = "msg err";
        msg.textContent = "Не удалось отправить запрос. Попробуйте позже.";
      }
    } catch (err) {
      msg.className = "msg err";
      msg.textContent = "Сеть недоступна.";
    } finally {
      btn.disabled = false; btn.textContent = "Отправить ссылку";
    }
  });
})();
</script>
</body>
</html>
