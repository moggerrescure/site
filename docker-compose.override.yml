# Этот файл compose подхватывает АВТОМАТИЧЕСКИ, если он рядом с docker-compose.yml
# Применяется ТОЛЬКО в dev (когда запускаешь `docker compose up` без -f).
# В проде запускай: docker compose -f docker-compose.yml up -d  (без override)

services:
  db:
    ports:
      - "5433:5432"     # доступ к Postgres с хоста через DBeaver/psql

  backend:
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"     # прямой доступ к API минуя Caddy
    # Hot reload: Node 24 нативный --watch перезапускает процесс при изменении .js
    # migrate deploy остаётся, т.к. контейнер может стартовать после новых миграций.
    command: sh -c "npx prisma generate && npx -y prisma@6.19.3 migrate deploy && node --watch index.js"
    volumes:
      # Bind весь backend исходник с хоста → правки на MacBook сразу видны в контейнере.
      # Заменяет COPY-baked /app, поэтому никаких stale schema.prisma и т.п.
      - ./backend:/app
      # Анонимный volume защищает контейнерный node_modules от перезаписи хостовыми.
      # На MacBook node_modules может быть под Darwin/arm64 (bcrypt, sharp с native бинарями),
      # в контейнере — под Linux. Без этого volume bind ./backend:/app сломал бы запуск.
      - /app/node_modules
      # Bind-mount uploads — формально избыточен после ./backend:/app, но оставляем для ясности
      # и совместимости с frontend сервисом, который использует тот же путь.
      - ./backend/uploads:/app/uploads

  frontend:
    volumes:
      # Bind frontend исходники → hot reload при изменении HTML/CSS/JS
      - ./frontend/index.html:/srv/index.html
      - ./frontend/about.html:/srv/about.html
      - ./frontend/faq.html:/srv/faq.html
      - ./frontend/ai-constructor.html:/srv/ai-constructor.html
      - ./frontend/ai-constructor-test.html:/srv/ai-constructor-test.html
      - ./frontend/ai-mockup.html:/srv/ai-mockup.html
      - ./frontend/person.html:/srv/person.html
      - ./frontend/family-tree.html:/srv/family-tree.html
      - ./frontend/memory.html:/srv/memory.html
      - ./frontend/timeline.html:/srv/timeline.html
      - ./frontend/trash.html:/srv/trash.html
      - ./frontend/audit.html:/srv/audit.html
      - ./frontend/admin.html:/srv/admin.html
      - ./frontend/legacy-contact.html:/srv/legacy-contact.html
      - ./frontend/forgot-password.html:/srv/forgot-password.html
      - ./frontend/reset-password.html:/srv/reset-password.html
      - ./frontend/privacy.html:/srv/privacy.html
      - ./frontend/terms.html:/srv/terms.html
      - ./frontend/js:/srv/js
      - ./frontend/styles:/srv/styles
      - ./frontend/images:/srv/images
      - ./frontend/assets-v2:/srv/assets-v2
      # Тот же путь, read-only — Caddy отдаёт статику /uploads/* напрямую.
      - ./backend/uploads:/srv/uploads:ro
